<!doctype html>
<html lang="uk">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Вхід в кабінет</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body class="admin-login-theme">
  <main class="page">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        <div class="container narrow flashes">
          {% for category, message in messages %}
            <div class="flash {{ category }}">{{ message }}</div>
          {% endfor %}
        </div>
      {% endif %}
    {% endwith %}

    <div class="container narrow">
      <div class="card stack">
        <div>
          <h2>Вхід в кабінет</h2>
          <div class="muted">Авторизуйтесь для керування товарами, прийомкою, ревізією та мобільними повідомленнями.</div>
        </div>
        <form method="post" class="stack">
          <label class="field-label">Email</label>
          <input type="email" name="email" value="admin@usashop.local" required>
          <label class="field-label">Пароль</label>
          <input type="password" name="password" required>
          <button class="btn primary">Увійти</button>
        </form>
      </div>
    </div>
  </main>
</body>
</html>
